name: Scraping automatique (toutes les 2h, 6h-18h Montréal)

# 10-22 UTC = 6h-18h heure de Montréal (EDT) / 5h-17h en EST (hiver).
# Aucun run la nuit : l'inventaire concessionnaire ne bouge pas, et on
# économise des minutes GitHub Actions (~50% par rapport à 24/24).
on:
  schedule:
    - cron: '0 10-22/2 * * *'
  workflow_dispatch:

concurrency:
  group: scraper-cron
  cancel-in-progress: false

jobs:
  scrape-stale-sites:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper_ai/requirements.txt

      - name: Installer les dépendances Python
        run: |
          pip install -r scraper_ai/requirements.txt
          pip install requests

      - name: Installer les navigateurs Playwright
        run: playwright install chromium --with-deps

      - name: Exécuter le cron de scraping
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          AI_PROVIDER: genai
        run: python scripts/scraper_cron.py
