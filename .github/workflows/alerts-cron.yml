name: Alertes automatisées

on:
  # schedule désactivé — alertes en pause
  # schedule:
  #   - cron: '5,25,45 * * * *'
  workflow_dispatch:

concurrency:
  group: alert-cron
  cancel-in-progress: false

jobs:
  alert-check:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper_ai/requirements.txt

      - name: Installer les dépendances Python
        run: |
          pip install -r scraper_ai/requirements.txt
          pip install requests

      - name: Installer les navigateurs Playwright
        run: playwright install chromium --with-deps

      - name: Exécuter le cron d'alertes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          AI_PROVIDER: genai
        run: python scripts/alert_cron.py
