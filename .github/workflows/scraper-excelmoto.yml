name: 'Scraping Excel Moto (horaire)'

# Cron horaire DÉDIÉ à Excel Moto | Your Dealership in Montréal.
#
# Aligné sur le format des autres crons dédiés (morin-sports, etc.).
# Ne pas éditer à la main : régénérer via
# `python -m scraper_ai.scraper_usine.main https://www.excelmoto.com/`
# ou via l'API d'approbation `/api/admin/scrapers/excelmoto/approve`.
#
# Le script `scrape_single_site.py` skip automatiquement si le cache Supabase
# est < 55 min — donc aucun risque de doublon avec le cron orchestrateur
# global qui tourne à HH:00.

on:
  schedule:
    # Toutes les 2h entre 10h et 22h UTC = 6h-18h Montréal (EDT été,
    # 5h-17h EST hiver). 7 runs/jour : 6h, 8h, 10h, 12h, 14h, 16h, 18h.
    - cron: '23 10-22/2 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: "Ignorer le cache de fraîcheur (--force)"
        type: boolean
        default: false

concurrency:
  group: scraper-excelmoto
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper_ai/requirements.txt

      - name: Installer les dépendances Python
        run: |
          pip install -r scraper_ai/requirements.txt
          pip install requests supabase

      - name: Scraping Excel Moto
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          python scripts/scrape_single_site.py \
            --slug excelmoto \
            ${{ inputs.force && '--force' || '' }}
