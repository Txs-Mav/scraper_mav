# Banc de test pour scraper_usine
#
# Liste de sites témoins (NON couverts par dedicated_scrapers/registry.py)
# qu'on lance via scripts/usine_bench.py.
#
# Critère de validation : score moyen > 94/100. Si OK on déclenche la création
# du SQL + cron 2h (cf. plan usine-bench-cron-lessons).
#
# REMPLACER LES URLS PAR DE VRAIES URLS de concessionnaires QC absents du
# registre. Les suggestions ci-dessous sont des concessionnaires QC connus
# qui ne sont PAS dans dedicated_scrapers/registry.py au 2026-05-16.
#
# Pour vérifier qu'une URL n'est pas déjà couverte :
#   python -c "from scraper_ai.dedicated_scrapers.registry import DedicatedScraperRegistry as R; print(R.has_dedicated_scraper('https://...'))"

moto_qc:
  # Concessionnaires moto QC absents du registre — à VALIDER avec le user
  # avant exécution du bench.
  #
  # NOTE bench 2026-05-16 : daniellambert / fortinmoto / rpmsuzukimoto /
  # sherbrookehondamoto échouent en `NameResolutionError` (DNS).
  # Soit les domaines sont morts, soit ils ont changé. À VÉRIFIER avant
  # de réintégrer dans le bench.
  - url: "https://www.sportplusmoto.com/"
    note: "Sport Plus Moto (St-Hyacinthe)"
  - url: "https://www.actionmoto.ca/"
    note: "Action Moto (Sherbrooke)"
  - url: "https://www.properformance.ca/"
    note: "Pro Performance Moto"
  - url: "https://machinexpert.ca/"
    note: "MachineXpert (powersport) — domaine sans 's' final"
  - url: "https://www.repentignyhonda.ca/"
    note: "Repentigny Honda Moto"

auto_qc:
  # 2 concessionnaires auto QC absents du registre
  #
  # NOTE bench 2026-05-16 : bmwlaval bloque sur Cloudflare 403 sur tous les
  # sitemaps. Phase 1 doit fallback Playwright + stealth pour ce site.
  - url: "https://www.hyundaitr.com/"
    note: "Hyundai Trois-Rivieres"
  - url: "https://www.bmwlaval.com/"
    note: "BMW Laval (Cloudflare actif)"

# Options globales pour le bench. Ces valeurs sont surchargeables en CLI.
options:
  publish_threshold: 94  # gate de décision (score moyen > 94 => Phase 1)
  parallel: 2            # nombre de runs simultanés (RAM + tokens)
  dry_run: false         # passé à --dry-run sur le pipeline (analyse seule)
  no_publish: true       # toujours: bench ne doit pas publier en pending
  timeout_per_site_sec: 1800  # 30 min max par site
